<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mutawa Holding - Employee Management System</title>
    <style>
        :root {
            --window-teal: #008080;
            --white: #ffffff;
            --bg-gray: #d4d0c8; 
            --border-light: #fff;
            --border-dark: #808080;
        }

        body { 
            font-family: 'Tahoma', sans-serif; 
            background-color: #3b6ea5; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        
        .window-wrapper { 
            display: flex; 
            gap: 10px; 
            width: 100%;
            max-width: 1100px;
            background: var(--window-teal);
            padding: 15px;
            border: 3px double #fff;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .left-panel { 
            width: 250px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: var(--window-teal);
        }

        .company-branding {
            text-align: center;
            background: #fff;
            padding: 10px;
            border: 2px inset #fff;
            margin-bottom: 5px;
        }
        .company-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        .company-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--window-teal);
            margin: 0;
            text-transform: uppercase;
        }

        /* নতুন ইউজার প্যানেল স্টাইল */
        .user-indicator {
            color: #00ffff;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid #00ffff;
            padding-bottom: 5px;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .menu-btn { 
            padding: 10px; 
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            background: var(--bg-gray); 
            text-align: center; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000;
            font-size: 13px;
            box-shadow: inset 1px 1px 0px #fff;
            width: 100%;
            box-sizing: border-box;
        }
        .menu-btn:active, .menu-btn.active { 
            background: #c0c0c0;
            border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
        }

        .search-container {
            border: 2px inset #fff;
            padding: 12px;
            background: var(--window-teal);
            color: #fff;
        }
        .search-container label {
            font-weight: bold;
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
        }

        .right-panel { 
            flex: 1; 
            background: var(--bg-gray); 
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .window-header {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls {
            display: flex;
            gap: 3px;
        }
        .win-btn {
            background: var(--bg-gray);
            border: 1px solid #fff;
            box-shadow: 1px 1px 1px #000;
            width: 16px;
            height: 16px;
            font-size: 10px;
            font-weight: bold;
            color: black;
            text-align: center;
            cursor: pointer;
            line-height: 12px;
        }

        .window-body {
            padding: 20px;
            flex: 1;
        }
        
        .view-panel { 
            display: none; 
        }
        .view-panel.active { 
            display: block; 
        }

        .fieldset-box {
            border: 2px groove #fff;
            padding: 20px;
            position: relative;
        }
        .fieldset-title {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--bg-gray);
            padding: 0 5px;
            font-weight: bold;
            color: var(--window-teal);
            font-size: 13px;
        }

        .form-grid {
            display: flex;
            gap: 20px;
        }

        .fields-side {
            flex: 1;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-row label {
            width: 160px;
            font-weight: bold;
            color: var(--window-teal);
            font-size: 13px;
            text-align: right;
            padding-right: 15px;
        }
        .form-row input, .form-row select {
            flex: 1;
            padding: 4px 6px;
            border: 2px inset #fff;
            font-size: 13px;
            background: #fff;
        }

        .photo-side {
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .photo-frame {
            width: 130px;
            height: 150px;
            border: 2px inset #fff;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .file-upload-btn {
            background: var(--bg-gray);
            border: 1px solid #808080;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
        .win-save-btn {
            padding: 6px 25px;
            background: var(--bg-gray);
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 2px inset #fff;
        }
        .report-table td {
            padding: 8px;
            border: 1px solid #d4d0c8;
            font-size: 13px;
        }
        .report-table .label-cell {
            background: #f0f0f0;
            font-weight: bold;
            color: var(--window-teal);
            width: 150px;
        }

        .alert-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .msg-box {
            background: var(--bg-gray);
            width: 320px;
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            box-shadow: 2px 2px 12px rgba(0,0,0,0.4);
        }
        .msg-body {
            padding: 25px 20px;
            font-size: 13px;
            text-align: center;
            color: #000;
        }
        .msg-footer {
            padding-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- সিকিউর মেসেজ উইন্ডো পপ-আপ -->
    <div id="login-alert" class="alert-overlay">
        <div class="msg-box">
            <div class="window-header">
                <span>Portal Notification</span>
                <div class="window-controls"><div class="win-btn" onclick="closeAlert()">X</div></div>
            </div>
            <div class="msg-body">Connected to Al-Mutawa Holding Database Management System</div>
            <div class="msg-footer">
                <button type="button" class="win-save-btn" onclick="closeAlert()" style="padding: 4px 25px;">OK</button>
            </div>
        </div>
    </div>

    <div class="window-wrapper">
        
        <!-- বামের প্যানেল (পুরোনো নাম চিরতরে মুছে দেওয়া হয়েছে) -->
        <div class="left-panel">
            <div class="company-branding">
                <img class="company-logo" src="https://unsplash.com" alt="AMSC Logo">
                <h1 class="company-title">Al-Mutawa Holding</h1>
                <span style="font-size:10px; font-weight:bold; color:#555;">AMSC SYSTEM</span>
            </div>

            <!-- এখানে আর কোনো ফিক্সড নাম বা এডমিনিস্ট্রেটর টেক্সট আসবে না -->
            <div id="dynamic-user-indicator" class="user-indicator">Active Database Session</div>
            
            <button type="button" id="btn-add" class="menu-btn active" onclick="switchView('add-user-view')">Add New Employee</button>
            <button type="button" id="btn-view" class="menu-btn" onclick="switchView('report-view')">Manage User / Bio</button>

            <!-- সার্চ কন্টেইনার -->
            <div class="search-container">
                <label for="search-id">Find Employee ID:</label>
