<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>রাইহান ষ্টাডি সেন্টার</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>স্টুডেন্ট ডাটা এন্ট্রি</h2>
    <input type="text" id="roll" placeholder="রোল নাম্বার">
    <input type="text" id="name" placeholder="নাম">
    <input type="text" id="mobile" placeholder="মোবাইল নাম্বার">
    <button onclick="addStudent()">যোগ করুন</button>

    <hr>
    <input type="text" id="searchInput" onkeyup="searchStudent()" placeholder="সার্চ করুন...">

    <table id="studentTable">
        <thead>
            <tr><th>রোল</th><th>নাম</th><th>মোবাইল</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    function addStudent() {
        let roll = document.getElementById("roll").value;
        let name = document.getElementById("name").value;
        let mobile = document.getElementById("mobile").value;

        if(roll && name) {
            let table = document.getElementById("tableBody");
            let row = table.insertRow();
            row.innerHTML = `<td>${roll}</td><td>${name}</td><td>${mobile}</td>`;
            
            // ইনপুট বক্স খালি করা
            document.getElementById("roll").value = "";
            document.getElementById("name").value = "";
            document.getElementById("mobile").value = "";
        } else {
            alert("রোল এবং নাম অবশ্যই দিন!");
        }
    }

    function searchStudent() {
        let filter = document.getElementById("searchInput").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].textContent || rows[i].innerText;
            rows[i].style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
    }
</script>
</body>
</html>
