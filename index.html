<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mutawa Holding - Employee Management System</title>
    <style>
        :root {
            --window-teal: #008080;
            --white: #ffffff;
            --bg-gray: #d4d0c8; 
            --border-light: #fff;
            --border-dark: #808080;
        }

        body { 
            font-family: 'Tahoma', sans-serif; 
            background-color: #3b6ea5; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* মোবাইল ফ্রেন্ডলি মেইন উইন্ডো কাঠামো */
        .window-wrapper { 
            display: flex; 
            flex-direction: column; /* মোবাইলের জন্য উপর-নিচে লেআউট */
            gap: 10px; 
            width: 100%;
            max-width: 1100px;
            background: var(--window-teal);
            padding: 10px;
            border: 3px double #fff;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        /* বড় স্ক্রিনের (কম্পিউটার) জন্য পাশাপাশি লেআউট */
        @media (min-width: 768px) {
            .window-wrapper {
                flex-direction: row;
                padding: 15px;
            }
            .left-panel {
                width: 250px;
            }
        }

        /* বামের প্যানেল */
        .left-panel { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: var(--window-teal);
            box-sizing: border-box;
        }

        .company-branding {
            text-align: center;
            background: #fff;
            padding: 10px;
            border: 2px inset #fff;
        }
        .company-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        .company-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--window-teal);
            margin: 0;
            text-transform: uppercase;
        }

        .user-indicator {
            color: #00ffff;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid #00ffff;
            padding-bottom: 5px;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .menu-btn { 
            padding: 12px; 
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            background: var(--bg-gray); 
            text-align: center; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000;
            font-size: 13px;
            box-shadow: inset 1px 1px 0px #fff;
            width: 100%;
            box-sizing: border-box;
        }
        .menu-btn:active, .menu-btn.active { 
            background: #c0c0c0;
            border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
        }

        .search-container {
            border: 2px inset #fff;
            padding: 12px;
            background: var(--window-teal);
            color: #fff;
            box-sizing: border-box;
        }
        .search-container label {
            font-weight: bold;
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
        }

        /* ডানের মেইন ডিসপ্লে উইন্ডো */
        .right-panel { 
            flex: 1; 
            background: var(--bg-gray); 
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .window-header {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls {
            display: flex;
            gap: 3px;
        }
        .win-btn {
            background: var(--bg-gray);
            border: 1px solid #fff;
            box-shadow: 1px 1px 1px #000;
            width: 16px;
            height: 16px;
            font-size: 10px;
            font-weight: bold;
            color: black;
            text-align: center;
            cursor: pointer;
            line-height: 12px;
        }

        .window-body {
            padding: 15px;
            flex: 1;
            box-sizing: border-box;
        }
        
        .view-panel { 
            display: none; 
        }
        .view-panel.active { 
            display: block; 
        }

        .fieldset-box {
            border: 2px groove #fff;
            padding: 15px;
            position: relative;
            box-sizing: border-box;
        }
        .fieldset-title {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--bg-gray);
            padding: 0 5px;
            font-weight: bold;
            color: var(--window-teal);
            font-size: 13px;
        }

        /* মোবাইল ও কম্পিউটারের জন্য গ্রিড পরিবর্তন */
        .form-grid {
            display: flex;
            flex-direction: column-reverse; /* মোবাইলে ছবি আগে বা পরে সুন্দরভাবে দেখাবে */
            gap: 15px;
        }
        @media (min-width: 600px) {
            .form-grid {
                flex-direction: row;
                gap: 20px;
            }
        }

        .fields-side {
            flex: 1;
            width: 100%;
        }

        .form-row {
            display: flex;
            flex-direction: column; /* মোবাইলে লেখা এবং বক্স উপর-নিচে থাকবে */
            margin-bottom: 10px;
        }
        @media (min-width: 500px) {
            .form-row {
                flex-direction: row;
                align-items: center;
            }
            .form-row label {
                width: 140px;
                text-align: right;
                padding-right: 15px;
                margin-bottom: 0;
            }
        }
        
        .form-row label {
            font-weight: bold;
            color: var(--window-teal);
            font-size: 13px;
            margin-bottom: 3px;
        }
        .form-row input, .form-row select {
            width: 100%;
            padding: 6px;
            border: 2px inset #fff;
            font-size: 13px;
            background: #fff;
            box-sizing: border-box;
        }

        .photo-side {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        @media (min-width: 600px) {
            .photo-side {
                width: 140px;
            }
        }

        .photo-frame {
            width: 130px;
            height: 150px;
            border: 2px inset #fff;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .file-upload-btn {
            background: var(--bg-gray);
            border: 1px solid #808080;
            padding: 6px 12px;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            display: inline-block;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
        .win-save-btn {
            padding: 8px 30px;
            background: var(--bg-gray);
            border: 2px solid;
            border-color: var(--border-light) var(--border-dark) var(--border-dark) var(--border-light);
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            width: 100%; /* মোবাইলে বাটন বড় হবে */
        }
        @media (min-width: 500px) {
            .win-save-btn {
                width: auto;
            }
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 2px inset #fff;
        }
        .report-table tr {
            display: flex;
            flex-direction: column; /* মোবাইলে টেবিল ভাঙবে না */
            border-bottom: 1px solid #d4d0c8;
        }
        @media (min-width: 500px) {
            .report-table tr {
                flex-direction: row;
            }
        }
        .report-table td {
            padding: 8px;
            font-size: 13px;
            width: 100%;
            box-sizing: border-box;
        }
        .report-table .label-cell {
            background: #f0f0f0;
            font-weight: bold;
            color: var(--window-teal);
        }
        @media (min-width: 500px) {
            .report-table .label-cell {
                width: 150px;
            }
        }
    </style>
</head>
<body>

    <!-- পপ-আপ মেসেজ সম্পূর্ণ মুছে দেওয়া হয়েছে, এখন আর কোনো লক স্ক্রিন আসবে না -->

    <div class="window-wrapper">
        
        <!-- বামের প্যানেল -->
        <div class="left-panel">
            <div class="company-branding">
                <!-- লোগো ইমেজ বা প্লেসহোল্ডার টেক্সট -->
                <div style="font-weight: bold; color: var(--window-teal); margin-bottom: 5px;">[ AMSC LOGO ]</div>
                <h1 class="company-title">Al-Mutawa Holding</h1>
