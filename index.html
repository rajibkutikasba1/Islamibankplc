<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mutawa Group - Employees Information System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Corporate Logo Style */
        .main-logo { width: 100%; max-width: 240px; height: auto; margin-bottom: 10px; }
        .user-photo { width: 90px; height: 90px; margin: 0 auto 15px; display: block; border-radius: 50%; border: 2px solid #1a237e; }
        
        h2 { color: #1a237e; margin-top: 5px; margin-bottom: 5px; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; font-weight: bold; text-transform: uppercase; }
        
        .section { border: 1px solid #e0e0e0; padding: 20px; margin: 20px 0; border-radius: 10px; background: #fbfbfb; text-align: left; }
        h3 { margin-top: 0; color: #1a237e; border-bottom: 2px solid #1a237e; padding-bottom: 8px; font-size: 16px; font-weight: 600; }
        
        label { font-weight: 600; display: block; margin-top: 12px; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 11px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus { border-color: #1a237e; outline: none; box-shadow: 0 0 5px rgba(26,35,126,0.2); }
        
        button { width: 100%; padding: 12px; margin-top: 18px; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-save { background-color: #1a237e; } 
        .btn-save:hover { background-color: #0d1b60; }
        .btn-search { background-color: #2e7d32; }
        .btn-search:hover { background-color: #1b5e20; }
        
        .result-box { background: #edf7ed; border: 1px solid #c8e6c9; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; text-align: left; }
        .result-box h4 { margin-top: 0; color: #1b5e20; border-bottom: 1px solid #c8e6c9; padding-bottom: 5px; }
        .result-item { margin: 8px 0; font-size: 15px; color: #222; }
    </style>
</head>
<body>

<div class="container">
    <img class="main-logo" src="https://i.ibb.co/v6XpSgD6/Al-mutwa-logo.png" alt="Al-Mutawa Group Logo">
    
    <h2>Employees Information System</h2>
    <div class="subtitle">Al-Mutawa Joint Stock Co. Database</div>

    <div class="section">
        <h3>📥 Register New Employee</h3>
        
        <label>Select Country:</label>
        <select id="regCountry">
            <option value="Saudi Arabia (KSA)">Saudi Arabia (KSA)</option>
            <option value="Kuwait (KW)">Kuwait (KW)</option>
            <option value="United Arab Emirates (UAE)">United Arab Emirates (UAE)</option>
            <option value="Qatar (QA)">Qatar (QA)</option>
            <option value="Oman (OM)">Oman (OM)</option>
            <option value="Bahrain (BH)">Bahrain (BH)</option>
        </select>

        <label>Employee Name:</label>
        <input type="text" id="regName" placeholder="Enter full name">

        <label>Iqama / National ID Number:</label>
        <input type="text" id="regIqama" placeholder="Enter Iqama or ID number">

        <label>Passport Number:</label>
        <input type="text" id="regPassport" placeholder="Enter passport number">

        <label>Mobile Number:</label>
        <input type="text" id="regMobile" placeholder="Enter mobile number">

        <button class="btn-save" onclick="saveEmployeeData()">Save Information</button>
    </div>

    <div class="section">
        <h3>🔍 Search Employee</h3>
        
        <label>Search by Iqama Number:</label>
        <input type="text" id="searchIqama" placeholder="Enter saved Iqama number">

        <button class="btn-search" onclick="searchEmployeeData()">Search Database</button>

        <div id="resultCard" class="result-box">
            <div style="text-align: center;">
                <img class="user-photo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User Profile">
            </div>
            <h4>🎯 Employee Profile Found:</h4>
            <div class="result-item"><b>Country:</b> <span id="resCountry"></span></div>
            <div class="result-item"><b>Name:</b> <span id="resName"></span></div>
            <div class="result-item"><b>Iqama No:</b> <span id="resIqama"></span></div>
            <div class="result-item"><b>Passport No:</b> <span id="resPassport"></span></div>
            <div class="result-item"><b>Mobile No:</b> <span id="resMobile"></span></div>
        </div>
    </div>
</div>

<script>
    // Save Data Function
    function saveEmployeeData() {
        const country = document.getElementById('regCountry').value;
        const name = document.getElementById('regName').value.trim();
        const iqama = document.getElementById('regIqama').value.trim();
        const passport = document.getElementById('regPassport').value.trim();
        const mobile = document.getElementById('regMobile').value.trim();

        if (!name || !iqama || !passport || !mobile) {
            alert("🚨 Please fill in all fields correctly!");
            return;
        }

        const employeeData = {
            country: country,
            name: name,
            passport: passport,
            mobile: mobile
        };

        localStorage.setItem('almutawa_' + iqama, JSON.stringify(employeeData));
        alert("✅ Success! Data saved for Iqama No: " + iqama);
        
        // Clear input fields
        document.getElementById('regName').value = '';
        document.getElementById('regIqama').value = '';
        document.getElementById('regPassport').value = '';
        document.getElementById('regMobile').value = '';
    }

    // Search Data Function
    function searchEmployeeData() {
        const sIqama = document.getElementById('searchIqama').value.trim();
        const card = document.getElementById('resultCard');

        if (!sIqama) {
            alert("🚨 Please enter an Iqama number to search!");
            return;
        }

        const savedData = localStorage.getItem('almutawa_' + sIqama);

        if (savedData) {
            const employee = JSON.parse(savedData);
            
            document.getElementById('resCountry').innerText = employee.country;
            document.getElementById('resName').innerText = employee.name;
            document.getElementById('resIqama').innerText = sIqama;
            document.getElementById('resPassport').innerText = employee.passport;
            document.getElementById('resMobile').innerText = employee.mobile;
            
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
            alert("❌ No record found for this Iqama number in Al-Mutawa Group Database.");
        }
    }
</script>

</body>
</html>
