<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mutawa Holding - Employee Record System</title>
    <style>
        :root {
            --primary-teal: #008080;
            --dark-teal: #005a5a;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --text-dark: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 15px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
        }

        /* হেডার সেকশন */
        .header {
            background-color: var(--primary-teal);
            color: var(--white);
            text-align: center;
            padding: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            opacity: 0.9;
        }

        /* নেভিগেশন ট্যাব */
        .tabs {
            display: flex;
            background: #eef2f1;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--white);
            color: var(--primary-teal);
            border-bottom: 3px solid var(--primary-teal);
        }

        /* সার্চ বক্স সেকশন */
        .search-section {
            padding: 15px;
            background: #eef2f1;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .search-input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }
        .search-btn {
            background: var(--primary-teal);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .search-btn:hover {
            background: var(--dark-teal);
        }

        /* মেইন কন্টেন্ট বডি */
        .content-body {
            padding: 20px;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        /* ফর্ম লেআউট */
        .form-grid {
            display: flex;
            flex-direction: column-reverse;
            gap: 20px;
        }
        @media (min-width: 650px) {
            .form-grid {
                flex-direction: row;
            }
        }

        .inputs-side {
            flex: 1;
        }
        .photo-side {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        @media (min-width: 650px) {
            .photo-side {
                width: 160px;
            }
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--dark-teal);
            font-size: 13px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-teal);
        }

        /* ফটো বক্স */
        .photo-box {
            width: 140px;
            height: 160px;
            border: 2px dashed var(--primary-teal);
            border-radius: 6px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-label {
            background: #eef2f1;
            border: 1px solid var(--primary-teal);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            color: var(--primary-teal);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-teal);
            color: var(--white);
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            background: var(--dark-teal);
        }

        /* প্রোফাইল টেবিল ভিউ */
        .profile-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        @media (min-width: 600px) {
            .profile-card {
                flex-direction: row;
            }
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
        }
        .info-table td {
            padding: 10px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
        }
        .info-table .label-td {
            font-weight: bold;
            color: var(--primary-teal);
            width: 140px;
        }
        .info-table .value-td {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- হেডার টাইটেল বার -->
        <div class="header">
            <h1>AL-MUTAWA HOLDING</h1>
            <p>Employee Database Management System (AMSC)</p>
        </div>

        <!-- নেভিগেশন মেনু ট্যাব -->
        <div class="tabs">
            <button id="tab-add" class="tab-btn active" onclick="switchTab('add-panel')">New Employee Entry</button>
            <button id="tab-view" class="tab-btn" onclick="switchTab('view-panel')">View Employee Profile</button>
        </div>

        <!-- সার্চ বার (আইডি দিয়ে সহজে খোঁজার জন্য) -->
        <div class="search-section">
            <input type="text" id="search-id" class="search-input" placeholder="কর্মচারীর ID লিখুন (যেমন: Emp-101)">
            <button class="search-btn" onclick="searchEmployee()">Search</button>
        </div>

        <div class="content-body">
            
            <!-- ১. নতুন কর্মচারী সেভ করার প্যানেল -->
            <div id="add-panel" class="panel active">
                <form id="employeeForm" onsubmit="saveEmployee(event); return false;">
                    <div class="form-grid">
                        
                        <!-- ইনপুট ফিল্ড সমূহ -->
                        <div class="inputs-side">
                            <div class="form-group">
                                <label>Employee ID *</label>
                                <input type="text" id="emp-id" placeholder="যেমন: Emp-101" required>
                            </div>
                            <div class="form-group">
                                <label>Full Name (সম্পূর্ণ নাম) *</label>
                                <input type="text" id="emp-name" placeholder="কর্মচারীর নাম লিখুন" required>
                            </div>
                            <div class="form-group">
                                <label>Country (দেশের নাম) *</label>
                                <input type="text" id="emp-country" placeholder="যেমন: Bangladesh" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number *</label>
                                <input type="text" id="emp-phone" placeholder="যেমন: +966..." required>
                            </div>
                            <div class="form-group">
                                <label>Iqama Number (আকামা নম্বর) *</label>
                                <input type="text" id="emp-iqama" placeholder="১০ ডিজিটের আকামা নম্বর" required>
                            </div>
                            <div class="form-group">
                                <label>Passport Number (পাসপোর্ট নম্বর) *</label>
                                <input type="text" id="emp-passport" placeholder="পাসপোর্ট নম্বর লিখুন" required>
                            </div>
                            <div class="form-group">
                                <label>Designation / Role *</label>
                                <select id="emp-role">
                                    <option value="Employee">Employee</option>
                                    <option value="Manager">Manager</option>
                                    <option value="Administrator">Administrator</option>
                                </select>
                            </div>
