<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mutawa Holding - Employee Record System</title>
    <style>
        :root {
            --primary-teal: #008080;
            --dark-teal: #005a5a;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --text-dark: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 15px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* পিন লক স্ক্রিন ডিজাইন */
        .lock-screen-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #3b6ea5; /* ক্লাসিক ব্যাকগ্রাউন্ড কালার */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }
        .pin-box {
            background: var(--white);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 320px;
            text-align: center;
            border: 2px solid var(--primary-teal);
        }
        .pin-box h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary-teal);
            text-transform: uppercase;
        }
        .pin-box p {
            margin: 0 0 20px 0;
            font-size: 12px;
            color: #666;
        }
        .pin-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 5px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .pin-input:focus {
            outline: none;
            border-color: var(--primary-teal);
        }
        .login-btn {
            width: 100%;
            background: var(--primary-teal);
            color: var(--white);
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .login-btn:hover {
            background: var(--dark-teal);
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        /* মূল অ্যাপ্লিকেশন কাঠামো */
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
            display: none; /* লগইন না হওয়া পর্যন্ত লুকানো থাকবে */
        }

        /* হেডার সেকশন */
        .header {
            background-color: var(--primary-teal);
            color: var(--white);
            text-align: center;
            padding: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            opacity: 0.9;
        }

        /* নেভিগেশন ট্যাব */
        .tabs {
            display: flex;
            background: #eef2f1;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--white);
            color: var(--primary-teal);
            border-bottom: 3px solid var(--primary-teal);
        }

        /* সার্চ বক্স সেকশন */
        .search-section {
            padding: 15px;
            background: #eef2f1;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .search-input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }
        .search-btn {
            background: var(--primary-teal);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .search-btn:hover {
            background: var(--dark-teal);
        }

        /* মেইন কন্টেন্ট বডি */
        .content-body {
            padding: 20px;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        /* ফর্ম লেআউট */
        .form-grid {
            display: flex;
            flex-direction: column-reverse;
            gap: 20px;
        }
        @media (min-width: 650px) {
            .form-grid {
                flex-direction: row;
            }
        }

        .inputs-side {
            flex: 1;
        }
        .photo-side {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        @media (min-width: 650px) {
            .photo-side {
                width: 160px;
            }
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--dark-teal);
            font-size: 13px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* ফটো বক্স */
        .photo-box {
            width: 140px;
            height: 160px;
            border: 2px dashed var(--primary-teal);
            border-radius: 6px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-label {
            background: #eef2f1;
            border: 1px solid var(--primary-teal);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            color: var(--primary-teal);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-teal);
            color: var(--white);
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* প্রোফাইল কার্ড */
        .profile-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        @media (min-width: 600px) {
            .profile-card {
                flex-direction: row;
            }
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
        }
        .info-table td {
            padding: 10px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
        }
        .info-table .label-td {
            font-weight: bold;
            color: var(--primary-teal);
            width: 140px;
        }
    </style>
</head>
<body>

    <!-- সিকিউর পিন লক স্ক্রিন ওয়ান ওভারলে -->
    <div id="lock-screen" class="lock-screen-overlay">
        <div class="pin-box">
            <h2>AMSC Secure System</h2>
            <p>অনুগ্রহ করে নিরাপত্তা পিন নম্বরটি প্রবেশ করান</p>
            
            <form onsubmit="checkPin(event)">
                <input type="password" id="system-pin" class="pin-input" maxlength="6" placeholder="******" required autofocus>
                <button type="submit" class="login-btn">Login System</button>
            </form>
            
            <div id="error-alert" class="error-msg">ভুল পিন! আবার চেষ্টা করুন।</div>
        </div>
    </div>

    <!-- মূল অ্যাপ্লিকেশন কন্টেইনার (পিন কোড ভেরিফাই হলে এটি দৃশ্যমান হবে) -->
    <div id="main-app" class="container">
        <div class="header">
            <h1>AL-MUTAWA HOLDING</h1>
            <p>Employee Database Management System (AMSC)</p>
        </div>

        <div class="tabs">
            <button id="tab-add" class="tab-btn active" onclick="switchTab('add-panel')">New Employee Entry</button>
            <button id="tab-view" class="tab-btn" onclick="switchTab('view-panel')">View Employee Profile</button>
        </div>

        <div class="search-section">
            <input type="text" id="search-id" class="search-input" placeholder="কর্মচারীর ID লিখুন (যেমন: Emp-101)">
            <button class="search-btn" onclick="searchEmployee()">Search</button>
        </div>

        <div class="content-body">
            <div id="add-panel" class="panel active">
