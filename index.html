<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Record Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #3b6ea5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .main-box {
            width: 100%;
            max-width: 500px;
            background: #008080; /* Teal Color */
            padding: 15px;
            border: 3px double #fff;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .app-title {
            color: white;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .app-sub {
            color: #00ffff;
            text-align: center;
            font-size: 12px;
            margin-bottom: 20px;
        }
        
        /* সার্চ বক্স স্টাইল */
        .search-area {
            background: #d4d0c8;
            padding: 10px;
            border: 2px inset #fff;
            margin-bottom: 15px;
        }
        .search-title {
            font-weight: bold;
            color: #008080;
            font-size: 13px;
            margin-bottom: 5px;
        }
        
        /* ইনপুট বক্স ও বাটন স্টাইল */
        .card-body {
            background: #d4d0c8;
            padding: 15px;
            border: 2px inset #fff;
        }
        .input-row {
            margin-bottom: 10px;
        }
        .input-row label {
            display: block;
            font-weight: bold;
            color: #008080;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .input-row input {
            width: 100%;
            padding: 8px;
            border: 2px inset #fff;
            background: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        /* ছবি আপলোড বক্স */
        .photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 15px 0;
            background: #fff;
            padding: 10px;
            border: 2px inset #fff;
        }
        .photo-frame {
            width: 130px;
            height: 150px;
            border: 1px solid #808080;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* বড় এবং স্পষ্ট বাটন */
        .btn-style {
            width: 100%;
            background: #d4d0c8;
            color: black;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .btn-style:active {
            border-color: #808080 #fff #fff #808080;
            background: #c0c0c0;
        }
        .save-btn {
            background: #008080 !important;
            color: white !important;
            border-color: #00b3b3 #004d4d #004d4d #00b3b3 !important;
            font-size: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <div class="app-title">AL-MUTAWA HOLDING</div>
        <div class="app-sub">AMSC Employee Record Program</div>

        <!-- ১. ইনফরমেশন খোঁজার বাটন (FIND INFORMATION BOX) -->
        <div class="search-area">
            <div class="search-title">FIND EMPLOYEE INFORMATION (খুঁজুন):</div>
            <input type="text" id="search-id" style="width: 100%; padding: 8px; border: 2px inset #fff; margin-bottom: 8px; box-sizing: border-box;" placeholder="Employee ID লিখুন...">
            <button type="button" class="btn-style" onclick="findEmployee()">FIND INFORMATION</button>
        </div>

        <!-- ২. নতুন ডেটা লেখার ফরম (ENTRY FORM) -->
        <div class="card-body">
            <div class="search-title" style="margin-bottom: 10px; border-bottom: 1px solid #008080; padding-bottom: 5px;">EMPLOYEE DATA ENTRY & VIEW:</div>
            
            <div class="input-row">
                <label>Employee ID :</label>
                <input type="text" id="input-id" placeholder="যেমন: 101">
            </div>
            <div class="input-row">
                <label>Full Name (নাম) :</label>
                <input type="text" id="input-name">
            </div>
            <div class="input-row">
                <label>Country (দেশ) :</label>
                <input type="text" id="input-country">
            </div>
            <div class="input-row">
                <label>Phone Number (মোবাইল) :</label>
                <input type="text" id="input-phone">
            </div>
            <div class="input-row">
                <label>Iqama Number (আকামা) :</label>
                <input type="text" id="input-iqama">
            </div>
            <div class="input-row">
                <label>Passport Number (পাসপোর্ট) :</label>
                <input type="text" id="input-passport">
            </div>

            <!-- ছবি দেওয়ার ঘর -->
            <div class="photo-section">
                <div class="photo-frame">
                    <img id="display-photo" src="https://placeholder.com" alt="Employee Photo">
                </div>
                <label class="btn-style" style="text-align: center; display: block; padding: 6px; font-size: 12px; width: auto;">
                    SELECT PHOTO (ছবি দিন)
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="uploadPhoto(this)">
                </label>
            </div>

            <!-- ৩. ডাটা সেইভ করার বোতাম (SAVE RECORD BUTTON) -->
            <button type="button" class="btn-style save-btn" onclick="saveEmployee()">SAVE EMPLOYEE RECORD</button>
        </div>
    </div>

    <!-- জাভাস্ক্রিপ্ট কোড -->
    <script>
        // ডেটাবেজ অবজেক্ট (ব্রাউজার মেমোরি ব্যাকআপ সহ)
        let employeeDB = JSON.parse(localStorage.getItem('AMSC_DATA_STORE')) || {};
        let selectedPhotoBase64 = "https://placeholder.com";

        // ছবি আপলোড করার লজিক
        function uploadPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedPhotoBase64 = e.target.result;
                    document.getElementById('display-photo').src = selectedPhotoBase64;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ডেটা সেইভ (SAVE) করার মেকানিজম
        function saveEmployee() {
            const id = document.getElementById('input-id').value.trim();
            const name = document.getElementById('input-name').value.trim();
            const country = document.getElementById('input-country').value.trim();
            const phone = document.getElementById('input-phone').value.trim();
            const iqama = document.getElementById('input-iqama').value.trim();
            const passport = document.getElementById('input-passport').value.trim();

            if (!id || !name) {
                alert("Please enter Employee ID and Full Name!");
                return;
            }

            // অবজেক্টে ডেটা স্টোর
            employeeDB[id] = {
                id: id,
                name: name,
                country: country,
                phone: phone,
                iqama: iqama,
                passport: passport,
                photo: selectedPhotoBase64
            };

            // লোকাল স্টোরেজে পার্মানেন্ট সেভ
            localStorage.setItem('AMSC_DATA_STORE', JSON.stringify(employeeDB));
            alert("Employee ID: " + id + " Successfully Saved!");
        }

        // ডেটা খোঁজার বাটন (FIND INFORMATION) মেকানিজম
        function findEmployee() {
            const searchId = document.getElementById('search-id').value.trim();
            
            if (!searchId) {
                alert("Please enter an Employee ID to find!");
                return;
            }

            if (employeeDB[searchId]) {
                const emp = employeeDB[searchId];
                
                // স্ক্রিনে ডেটা ফিরিয়ে আনা
                document.getElementById('input-id').value = emp.id;
                document.getElementById('input-name').value = emp.name;
                document.getElementById('input-country').value = emp.country;
                document.getElementById('input-phone').value = emp.phone;
                document.getElementById('input-iqama').value = emp.iqama;
                document.getElementById('input-passport').value = emp.passport;
                document.getElementById('display-photo').src = emp.photo;
                selectedPhotoBase64 = emp.photo;

                alert("Employee Information Found & Loaded!");
            } else {
                alert("Employee ID: '" + searchId + "' not found in database!");
            }
        }
    </script>
</body>
</html>
